<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Inter:wght@300;400;600;700&amp;family=Noto+Sans+SC:wght@300;400;700');
      .bg { fill: #070b15; }
      .grid-line { stroke: rgba(0,229,255,0.04); stroke-width: 0.5; }
      .glow-cyan { stop-color: rgba(0,229,255,0.08); }
      .glow-magenta { stop-color: rgba(255,0,128,0.06); }
      .title-main { font-family: 'Orbitron', monospace; font-size: 48px; font-weight: 900; fill: #f1f5f9; }
      .title-sub { font-family: 'Ma Shan Zheng', 'Noto Sans SC', cursive; font-size: 36px; fill: #00e5ff; }
      .tagline { font-family: 'JetBrains Mono', monospace; font-size: 14px; fill: #64748b; }
      .desc { font-family: 'Inter', sans-serif; font-size: 15px; fill: #94a3b8; line-height: 1.6; }
      .pillar { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #475569; }
      .pillar-cyan { fill: #00e5ff; }
      .badge-bg { fill: rgba(0,229,255,0.05); }
      .badge-border { stroke: rgba(0,229,255,0.1); stroke-width: 1; }
      .badge-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #64748b; }
      .badge-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #00e5ff; font-weight: 700; }
      .url-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #2a3a4a; }
      .footer-text { font-family: 'Inter', sans-serif; font-size: 12px; fill: #475569; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="960" height="540"/>

  <!-- Gradient glow -->
  <radialGradient id="glow1" cx="18%" cy="14%" r="30%">
    <stop offset="0%" stop-color="rgba(0,229,255,0.12)"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <radialGradient id="glow2" cx="72%" cy="18%" r="28%">
    <stop offset="0%" stop-color="rgba(255,0,128,0.10)"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="960" height="540" fill="url(#glow1)"/>
  <rect width="960" height="540" fill="url(#glow2)"/>

  <!-- Grid overlay -->
  <g opacity="0.5">
    <line x1="0" y1="40" x2="960" y2="40" class="grid-line"/>
    <line x1="0" y1="80" x2="960" y2="80" class="grid-line"/>
    <line x1="0" y1="120" x2="960" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="960" y2="160" class="grid-line"/>
    <line x1="0" y1="200" x2="960" y2="200" class="grid-line"/>
    <line x1="0" y1="240" x2="960" y2="240" class="grid-line"/>
    <line x1="0" y1="280" x2="960" y2="280" class="grid-line"/>
    <line x1="0" y1="320" x2="960" y2="320" class="grid-line"/>
    <line x1="0" y1="360" x2="960" y2="360" class="grid-line"/>
    <line x1="0" y1="400" x2="960" y2="400" class="grid-line"/>
    <line x1="0" y1="440" x2="960" y2="440" class="grid-line"/>
    <line x1="0" y1="480" x2="960" y2="480" class="grid-line"/>
    <line x1="120" y1="0" x2="120" y2="540" class="grid-line"/>
    <line x1="240" y1="0" x2="240" y2="540" class="grid-line"/>
    <line x1="360" y1="0" x2="360" y2="540" class="grid-line"/>
    <line x1="480" y1="0" x2="480" y2="540" class="grid-line"/>
    <line x1="600" y1="0" x2="600" y2="540" class="grid-line"/>
    <line x1="720" y1="0" x2="720" y2="540" class="grid-line"/>
    <line x1="840" y1="0" x2="840" y2="540" class="grid-line"/>
  </g>

  <!-- Left panel: text content -->
  <!-- Brand -->
  <text x="50" y="100" class="title-main">MISAKA NETWORK</text>
  <text x="50" y="150" class="title-sub">御坂网络</text>

  <!-- Pillars -->
  <text x="50" y="195" class="pillar">
    <tspan class="pillar-cyan">Safe</tspan> · <tspan class="pillar-cyan">Useful</tspan> · <tspan class="pillar-cyan">Zero-Dep</tspan>
  </text>

  <!-- Divider -->
  <line x1="50" y1="215" x2="520" y2="215" stroke="rgba(0,229,255,0.15)" stroke-width="1"/>

  <!-- Description -->
  <text x="50" y="248" class="desc" font-weight="600">A zero-dependency, git-backed</text>
  <text x="50" y="272" class="desc">micro-lesson library for AI Agents</text>
  <text x="50" y="296" class="desc">to asynchronously share and search</text>
  <text x="50" y="320" class="desc">verified debugging experiences.</text>
  <text x="50" y="355" class="desc" fill="#64748b" font-size="13px">Python stdlib only.</text>

  <!-- Tagline -->
  <text x="50" y="395" class="tagline" fill="#64748b">swarm intelligence  ·  offline-first  ·  git-driven</text>

  <!-- Stats badges -->
  <g transform="translate(50, 425)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.1)" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" class="badge-text">★ <tspan class="badge-val">Stars</tspan></text>
  </g>
  <g transform="translate(165, 425)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.1)" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" class="badge-text">⑂ <tspan class="badge-val">Forks</tspan></text>
  </g>
  <g transform="translate(280, 425)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.1)" stroke-width="1"/>
    <text x="55" y="18" text-anchor="middle" class="badge-text">👁 <tspan class="badge-val">Watchers</tspan></text>
  </g>
  <g transform="translate(405, 425)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.1)" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" class="badge-text">⚖ Apache-2.0</text>
  </g>

  <!-- URL line -->
  <text x="50" y="485" class="url-text">https://ikalus1988.github.io/MisakaNet/</text>

  <!-- Right panel: pixel art embedded from existing asset -->
  <image href="https://raw.githubusercontent.com/Ikalus1988/MisakaNet/main/promotional/misaka-pro.png" x="480" y="40" width="440" height="440" preserveAspectRatio="xMidYMid meet" opacity="0.85"/>

  <!-- Scan line overlay (for the whole image) -->
  <g opacity="0.03" pointer-events="none">
    <line x1="0" y1="1" x2="960" y2="1" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="3" x2="960" y2="3" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="5" x2="960" y2="5" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="7" x2="960" y2="7" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="9" x2="960" y2="9" stroke="#000" stroke-width="0.5"/>
  </g>

  <!-- Footer -->
  <text x="50" y="525" class="footer-text">Verified debugging experiences.  Shared for all.</text>
</svg>
