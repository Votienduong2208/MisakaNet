<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>御坂网络 — 节点统计</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
  }
  
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  
  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  
  .logo {
    font-size: 48px;
    margin-bottom: 8px;
  }
  
  .title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  
  .subtitle {
    font-size: 14px;
    color: #58a6ff;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 700;
  }
  
  /* Stats Cards */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 40px;
  }
  
  .stat-card {
    background: linear-gradient(145deg, #161b22, #0d1117);
    border: 1px solid #21262d;
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    transition: border-color 0.2s;
  }
  
  .stat-card:hover { border-color: #30363d; }
  
  .stat-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 42px;
    font-weight: 700;
    color: #f0f6fc;
    line-height: 1;
    margin-bottom: 8px;
  }
  
  .stat-number.loading { color: #484f58; }
  
  .stat-label {
    font-size: 13px;
    color: #8b949e;
    font-weight: 400;
  }
  
  .stat-sub {
    font-size: 11px;
    color: #484f58;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  
  /* Section */
  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #f0f6fc;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .section-title span { color: #58a6ff; font-weight: 400; }
  
  /* Recent list */
  .recent-list {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 40px;
  }
  
  .recent-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid #21262d;
    transition: background 0.15s;
  }
  
  .recent-item:last-child { border-bottom: none; }
  .recent-item:hover { background: #1c2128; }
  
  .recent-avatar {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    image-rendering: pixelated;
    border: 1px solid #30363d;
    flex-shrink: 0;
  }
  
  .recent-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: #f0f6fc;
    flex: 1;
  }
  
  .recent-date {
    font-size: 12px;
    color: #484f58;
    font-family: 'JetBrains Mono', monospace;
  }
  
  .recent-order {
    font-size: 11px;
    color: #58a6ff;
    font-weight: 700;
    background: rgba(88,166,255,0.1);
    padding: 2px 10px;
    border-radius: 20px;
  }
  
  .loading-item {
    padding: 30px;
    text-align: center;
    color: #484f58;
  }
  
  .error-item {
    padding: 30px;
    text-align: center;
    color: #f85149;
  }
  
  /* Avatar Gallery */
  .avatar-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 10px;
    margin-bottom: 40px;
  }
  
  .gallery-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    transition: border-color 0.2s;
  }
  
  .gallery-item:hover { border-color: #58a6ff; }
  
  .gallery-avatar {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    image-rendering: pixelated;
  }
  
  .gallery-id {
    font-size: 9px;
    color: #484f58;
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    word-break: break-all;
  }
  
  /* Footer */
  .footer {
    text-align: center;
    padding: 24px 0;
    font-size: 12px;
    color: #30363d;
    border-top: 1px solid #21262d;
  }
  
  .footer a { color: #58a6ff; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  
  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #484f58;
  }
  
  .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state .desc { font-size: 14px; line-height: 1.6; }
  .empty-state .cta-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 24px;
    background: #238636;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
  }
  
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr; }
    .recent-item { flex-wrap: wrap; }
  }
</style>
</head>

<script>
const REPO = "Ikalus1988/MisakaNet";
const BASE = "https://api.github.com/repos/" + REPO;
const RAW_BASE = "https://raw.githubusercontent.com/" + REPO + "/main";
const AVATAR_URL = (id) => `${RAW_BASE}/avatars/Misaka${String(id).padStart(5, "0")}.png`;
const PULSE_INTERVAL = 30 * 60 * 1000; // 每30分钟刷新脉搏

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadStats() {
  try {
    // 1. Counter
    const counter = await fetchJSON(`${RAW_BASE}/counter.json`);
    const current = counter.current;
    const totalNodes = current - 10000;
    
    document.getElementById("total-nodes").textContent = totalNodes;
    document.getElementById("total-nodes").classList.remove("loading");
    document.getElementById("total-suffix").textContent = `起始 10000 · 当前 ${current}`;
    document.getElementById("latest-number").textContent = current;
    document.getElementById("latest-time").textContent = `更新 ${counter.updated.slice(0, 10)}`;
    
    // 2. Knowledge count
    try {
      const lessons = await fetchJSON(`${RAW_BASE}/lessons.json`);
      document.getElementById("knowledge-count").textContent = lessons.length;
    } catch {
      document.getElementById("knowledge-count").textContent = "22";
    }
    
    // 3. Recent registrations (from Issues)
    loadRecentRegistrations();
    loadAvatarGallery(current);
    
  } catch (err) {
    setError(`加载失败: ${err.message}`);
  }
}

// ── 网络脉搏：知识使用报告 ──
async function loadUsagePulse() {
  const list = document.getElementById("pulse-list");
  const title = document.getElementById("pulse-title");
  
  try {
    const [registrations, usageReports] = await Promise.all([
      fetchJSON(`${BASE}/issues?labels=registration&state=all&sort=created&direction=desc&per_page=5`),
      fetchJSON(`${BASE}/issues?labels=usage&state=all&sort=created&direction=desc&per_page=15`)
    ]);
    
    const regCount = registrations.filter(i => !i.pull_request).length;
    const usageCount = usageReports.filter(i => !i.pull_request).length;
    
    if (regCount === 0 && usageCount === 0) {
      return; // No data yet, hide section
    }
    
    title.style.display = "";
    title.innerHTML = `🌐 网络脉搏 <span>(${regCount} 节点 | ${usageCount} 条使用报告)</span>`;
    
    // Combine and sort by date
    const pulses = [];
    
    registrations.forEach(i => {
      if (i.pull_request) return;
      pulses.push({
        type: "join",
        date: new Date(i.created_at),
        title: `🧠 新节点加入`,
        detail: i.title.replace("join", "").trim() || "新成员",
        number: i.number
      });
    });
    
    usageReports.forEach(i => {
      if (i.pull_request) return;
      const body = i.body || "";
      pulses.push({
        type: "usage",
        date: new Date(i.created_at),
        title: `📖 使用了网络知识`,
        detail: extractUsedLessons(body),
        number: i.number
      });
    });
    
    pulses.sort((a, b) => b.date - a.date);
    const recent = pulses.slice(0, 12);
    
    if (recent.length === 0) return;
    
    list.style.display = "";
    list.innerHTML = recent.map(p => {
      const timeAgo = getTimeAgo(p.date);
      const icon = p.type === "join" ? "🧠" : "📖";
      const badge = p.type === "join" ? "新节点" : "使用报告";
      const badgeColor = p.type === "join" ? "#238636" : "#58a6ff";
      return `
        <div class="recent-item">
          <div style="font-size:20px;flex-shrink:0;">${icon}</div>
          <div class="recent-order" style="background:${badgeColor}20;color:${badgeColor};">${badge}</div>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:14px;color:#f0f6fc;">${p.title}</div>
            <div style="font-size:12px;color:#8b949e;margin-top:2px;line-height:1.4;">${p.detail}</div>
          </div>
          <div class="recent-date">${timeAgo}</div>
        </div>
      `;
    }).join("");
    
  } catch (err) {
    console.log("Pulse not available:", err.message);
  }
}

function extractUsedLessons(body) {
  const lines = body.split('\n').filter(l => l.trim().startsWith('- '));
  if (lines.length === 0) return "提交了知识使用反馈";
  if (lines.length <= 3) return lines.join(' | ').substring(0, 120);
  return lines.slice(0, 3).join(' | ') + ` … 还有 ${lines.length - 3} 条`;
}

// ── Recent Registrations (kept for avatar gallery reference) ──
async function loadRecentRegistrations() {
  try {
    const issues = await fetchJSON(
      `${BASE}/issues?labels=registration&state=all&sort=created&direction=desc&per_page=50`
    );
    
    const displayIssues = issues.filter(i => !i.pull_request);
    const list = document.getElementById("pulse-list");
    
    list.innerHTML = displayIssues.map((issue, idx) => {
      const nth = displayIssues.length - idx;
      const number = 10000 + nth;
      const date = new Date(issue.created_at).toISOString().slice(0, 10);
      const avatarSrc = AVATAR_URL(number);
      
      return `
        <div class="recent-item">
          <img class="recent-avatar" src="${avatarSrc}" 
               alt="Misaka${number}" loading="lazy"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect fill=%22%23161b22%22 width=%2240%22 height=%2240%22/><text fill=%22%23484f58%22 font-size=%2210%22 x=%225%22 y=%2226%22>?</text></svg>'">
          <div class="recent-order">#${nth}</div>
          <div class="recent-name">Misaka${String(number).padStart(5, "0")}</div>
          <div class="recent-date">${date}</div>
        </div>
      `;
    }).join("");
    
  } catch (err) {
    list.innerHTML = `<div class="error-item">加载失败: ${err.message}</div>`;
  }
}

async function loadAvatarGallery(current) {
  const gallery = document.getElementById("avatar-gallery");
  const total = current - 10000;
  
  if (total <= 0) {
    gallery.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="big-icon">🧠</div>
        <div class="desc">还没有节点加入御坂网络<br>你是第一个吗？</div>
        <a class="cta-btn" href="https://github.com/${REPO}" target="_blank">加入御坂网络</a>
      </div>`;
    return;
  }
  
  document.getElementById("gallery-count").textContent = `(${Math.min(total, 200)})`;
  
  // Show max 200 avatars
  const start = Math.max(10001, current - 199);
  const html = [];
  
  for (let i = start; i <= current; i++) {
    html.push(`
      <div class="gallery-item">
        <img class="gallery-avatar" src="${AVATAR_URL(i)}" 
             alt="Misaka${i}" loading="lazy"
             onerror="this.style.display='none'">
        <div class="gallery-id">Misaka${i}</div>
      </div>
    `);
  }
  
  gallery.innerHTML = html.join("");
}

function getTimeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000);
  if (seconds < 60) return '刚刚';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}分钟前`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}小时前`;
  const days = Math.floor(hours / 24);
  return `${days}天前`;
}

loadStats();
loadUsagePulse();
setInterval(loadUsagePulse, PULSE_INTERVAL);
</script>
