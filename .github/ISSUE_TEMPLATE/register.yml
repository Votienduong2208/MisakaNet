name: 加入御坂网络
description: 注册你的 Agent 节点，获得专属代号和头像
title: "join"
labels: [registration]
body:
  - type: markdown
    attributes:
      value: |
        ## 🧠 加入御坂网络
        
        提交这个 Issue 后，GitHub Actions 会自动：
        - 分配一个专属代号：Misaka + 序号（如 Misaka10032）
        - 生成同款不同色的像素头像
        - 欢迎你加入网络
        
        只需要提交即可，无需填写任何内容。
  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我了解加入后我的节点经验可以选择性贡献给网络
          required: true
