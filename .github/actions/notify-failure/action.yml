name: 'Notify on Failure'
description: 'Send notification when retries are exhausted. Supports GitHub comments and Feishu webhooks.'
inputs:
  failure_class:
    description: 'Classification from classify-failure action'
    required: true
  failure_summary:
    description: 'Summary from classify-failure action'
    required: true
  attempts_count:
    description: 'Number of retry attempts made'
    required: true
  workflow_name:
    description: 'Name of the workflow that failed'
    required: false
    default: ${{ github.workflow }}
  job_name:
    description: 'Name of the job that failed'
    required: false
    default: ${{ github.job }}
  feishu_webhook:
    description: 'Feishu webhook URL (optional)'
    required: false
    default: ''
outputs:
  notified:
    description: 'Whether notification was sent'
    value: ${{ steps.notify.outputs.notified }}
runs:
  using: 'composite'
  steps:
    - name: Send failure notification
      id: notify
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        CLASS="${{ inputs.failure_class }}"
        SUMMARY="${{ inputs.failure_summary }}"
        ATTEMPTS="${{ inputs.attempts_count }}"
        WORKFLOW="${{ inputs.workflow_name }}"
        JOB="${{ inputs.job_name }}"
        REPO="${{ github.repository }}"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        FEISHU="${{ inputs.feishu_webhook }}"

        NOTIFIED="false"

        # 1. Create GitHub issue comment (if triggered by issue/PR)
        if [ -n "${{ github.event.issue.number }}" ]; then
          ISSUE_NUM="${{ github.event.issue.number }}"
          gh api "repos/$REPO/issues/$ISSUE_NUM/comments" -f body="$(cat <<EOF
        🚨 **CI Failure Alert**

        **Workflow:** $WORKFLOW / $JOB
        **Classification:** $CLASS
        **Summary:** $SUMMARY
        **Attempts:** $ATTEMPTS
        **Run:** $RUN_URL

        > Auto-generated by ci-self-heal
        EOF
          )" 2>/dev/null && NOTIFIED="true"

          # Add label
          gh api "repos/$REPO/issues/$ISSUE_NUM/labels" -f labels='["ci: needs-human-review"]' 2>/dev/null || true

        elif [ -n "${{ github.event.pull_request.number }}" ]; then
          PR_NUM="${{ github.event.pull_request.number }}"
          gh api "repos/$REPO/issues/$PR_NUM/comments" -f body="$(cat <<EOF
        🚨 **CI Failure Alert**

        **Workflow:** $WORKFLOW / $JOB
        **Classification:** $CLASS
        **Summary:** $SUMMARY
        **Attempts:** $ATTEMPTS
        **Run:** $RUN_URL

        > Auto-generated by ci-self-heal
        EOF
          )" 2>/dev/null && NOTIFIED="true"

          # Add label
          gh api "repos/$REPO/issues/$PR_NUM/labels" -f labels='["ci: needs-human-review"]' 2>/dev/null || true
        fi

        # 2. Send Feishu notification if webhook configured
        if [ -n "$FEISHU" ]; then
          curl -s -X POST "$FEISHU" \
            -H "Content-Type: application/json" \
            -d "$(cat <<PAYLOAD
        {
          "msg_type": "interactive",
          "card": {
            "header": {
              "title": {"tag": "plain_text", "content": "🚨 CI Failure"},
              "template": "red"
            },
            "elements": [
              {"tag": "markdown", "content": "**Workflow:** $WORKFLOW / $JOB\n**Classification:** $CLASS\n**Summary:** $SUMMARY\n**Attempts:** $ATTEMPTS\n**Repo:** $REPO\n**Run:** [View]($RUN_URL)"}
            ]
          }
        }
        PAYLOAD
          )" 2>/dev/null && NOTIFIED="true"
        fi

        echo "notified=$NOTIFIED" >> "$GITHUB_OUTPUT"
        echo "📢 Notification sent: $NOTIFIED"
